version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: iff_wp_db
    restart: always
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SITE_URL: ${SITE_URL}
    volumes:
      - db_data:/var/lib/mysql
      - .:/repo
    command: 
      - /bin/bash
      - -c
      - |
        mkdir -p /docker-entrypoint-initdb.d
        cp /repo/db_backup.sql /docker-entrypoint-initdb.d/01.sql
        cp /repo/initdb/update-urls.sh /docker-entrypoint-initdb.d/02.sh
        chmod +x /docker-entrypoint-initdb.d/02.sh
        exec docker-entrypoint.sh mysqld

  wordpress:
    image: wordpress:latest
    container_name: iff_wp_app
    restart: always
    ports:
      - "${PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      SITE_URL: ${SITE_URL}
    volumes:
      - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db

volumes:
  db_data:
